version: 2

builds:
  - main: ./cmd/omni-5e
    binary: omni-5e
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "ghcr.io/omni-5e/omni-5e:{{ .Version }}"
      - "ghcr.io/omni-5e/omni-5e:latest"
    dockerfile: deploy/Dockerfile

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
